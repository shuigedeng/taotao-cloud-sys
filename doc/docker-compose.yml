  xxl-job-admin-3.4.0:
    image: xuxueli/xxl-job-admin:3.4.0
    container_name: xxl-job-admin-3.4.0
    restart: no
    ports:
      - "48080:8080"
    environment:
      PARAMS: >-
        --spring.datasource.url=jdbc:mysql://172.11.0.10:3306/xxl_job?useUnicode=true&useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&autoReconnect=true&serverTimezone=Asia/Shanghai
        --spring.datasource.username=root
        --spring.datasource.password=123456
        --xxl.job.accessToken=123456
    networks:
      taotao-cluster-network:
        ipv4_address: 172.11.0.27

  prometheus-3.12.0:
    image: prom/prometheus:v3.12.0
    container_name: prometheus-3.12.0
    restart: no
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.external-url=http://192.168.218.2:9090/'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    links:
      - alertmanager:alertmanager
    networks:
      taotao-cluster-network:
        ipv4_address: 172.11.0.28
  alertmanager-0.33.0:
    image: prom/alertmanager:v0.33.0
    container_name: alertmanager-0.33.0
    restart: no
    ports:
      - "9094:9093"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--cluster.listen-address='
      - '--cluster.advertise-address='
    networks:
      taotao-cluster-network:
        ipv4_address: 172.11.0.29
  grafana-13.0.2:
    image: grafana/grafana:13.0.2
    container_name: grafana-13.0.2
    restart: no
    ports:
      - "3000:3000"
    environment:
      - GF_INSTALL_PLUGINS=camptocamp-prometheus-alertmanager-datasource
    links:
      - prometheus:prometheus
      - alertmanager:alertmanager
    networks:
      taotao-cluster-network:
        ipv4_address: 172.11.0.30

  opentelemetry-collector-0.154.0:
    image: otel/opentelemetry-collector-contrib:0.154.0
    container_name: opentelemetry-collector-0.154.0
    restart: no
    ports:
      - "4317:4317"   # OTLP gRPC receiver
      - "4318:4318"   # OTLP HTTP receiver
      - "55679:55679" # ZPages endpoint
      - "8889:8889" # ZPages endpoint
    volumes:
      - ./otel/otel-config.yaml:/etc/otelcol/config.yaml
    command: [ "--config", "/etc/otelcol/config.yaml" ]
    networks:
      taotao-cluster-network:
        ipv4_address: 172.11.0.31

  loki-main:
    container_name: loki-main
    image: grafana/loki:main
    restart: no
    environment:
      - TZ=Asia/Shanghai
      - LANG=zh_CN.UTF-8
    ports:
      - "3100:3100"
    #command: -config.file=/mnt/config/loki-config.yaml
    networks:
      taotao-cluster-network:
        ipv4_address: 172.11.0.32

networks:
  taotao-cluster-network:
    external: true
