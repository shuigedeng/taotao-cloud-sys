services:
  mysql-8.4:
    hostname: mysql-8.4
    container_name: mysql-8.4
    image: mysql:8.4
    restart: no
    privileged: true
    ports:
      - "3306:3306"
    environment:
      TZ: Asia/Shanghai
      MYSQL_ROOT_HOST: '%'
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_USER: master
      MYSQL_PASSWORD: 123456
    command:
      --bind-address=172.11.0.10
      --max_connections=1000
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_general_ci
      --default-time-zone='+8:00'
      --explicit_defaults_for_timestamp=true
      --lower_case_table_names=1
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
    networks:
      taotao-cluster-network:
        ipv4_address: 172.11.0.10

  redis-7.4.0:
    image: redis:7.4.0
    container_name: redis-7.4.0
    restart: no
    environment:
      TZ: Asia/Shanghai
    ports:
      - "6379:6379"
    #command: [ "redis-server","/etc/redis/redis.conf" ]
    #    restart: always
    networks:
      taotao-cluster-network:
        ipv4_address: 172.11.0.12

  nacos-3.2.2:
    image: nacos/nacos-server:v3.2.2
    restart: no
    container_name: nacos-3.2.2
    privileged: true
    ports:
      - "8848:8848"
      - "9848:9848"
      - "8080:8080"
    environment:
      MODE: standalone
      PREFER_HOST_MODE: hostname
      SPRING_DATASOURCE_PLATFORM: mysql
      MYSQL_SERVICE_HOST: 172.11.0.10
      MYSQL_SERVICE_PORT: 3306
      MYSQL_SERVICE_USER: root
      MYSQL_SERVICE_PASSWORD: 123456
      MYSQL_SERVICE_DB_NAME: "nacos3.2.2"
      MYSQL_SERVICE_DB_PARAM: "characterEncoding=utf8&connectTimeout=1000&socketTimeout=3000&autoReconnect=true&useUnicode=true&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true"
      JVM_XMS: 256m
      JVM_XMX: 512m
      NACOS_AUTH_ENABLE: true
      NACOS_AUTH_TOKEN: SecretKey01234567890123456789012345345678999987654901234567890123456789
      NACOS_AUTH_IDENTITY_KEY: nacos
      NACOS_AUTH_IDENTITY_VALUE: nacos
    networks:
      taotao-cluster-network:
        ipv4_address: 172.11.0.13

