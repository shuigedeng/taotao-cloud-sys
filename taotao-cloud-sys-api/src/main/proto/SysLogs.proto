syntax = "proto3";

package com.taotao.cloud.sys.api.grpc;

option java_multiple_files = true;
option java_package = "com.taotao.cloud.sys.api.grpc";
option java_outer_classname = "LogGrpcServiceProto";
//option objc_class_prefix = "HLW";

service LogGrpcService {
  rpc insertLog (LogGrpcCommand) returns (LogGrpcResponse){}
  rpc updateLog (LogGrpcCommand) returns (LogGrpcResponse){}
  rpc searchLog (LogGrpcCommand) returns (LogGrpcResponse){}
  rpc deleteLog (LogGrpcCommand) returns (LogGrpcResponse){}
}

message LogGrpcCommand {
  string id = 1;
}

message LogGrpcResponse {
  string id = 1;
  string serialNum = 2;
  string userNum = 3;
  int32  status = 4;
  int32  type = 5;
  string address = 6;
  string createtime = 7;
  string updatetime = 8;
}
